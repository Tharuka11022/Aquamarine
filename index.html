<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aquamarine | Premium Pets</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #38a169; --primary-dark: #2f855a; --primary-light: #c6f6d5; --glass: rgba(255, 255, 255, 0.75); --dark: #1a202c; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { line-height: 1.6; color: var(--dark); background-color: #ffffff; overflow-x: hidden; }
    html { scroll-behavior: smooth; }

    #main-content { display: block; }
    #detail-view { display: none; min-height: 100vh; background: #fff; padding-top: 80px; }
    body.showing-details #main-content { display: none; }
    body.showing-details #detail-view { display: block; }

    /* Buffering Loader */
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; }
    .spinner { width: 45px; height: 45px; border: 5px solid var(--primary-light); border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }

    nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'Baloo 2', cursive; font-size: 1.4rem; color: var(--primary); font-weight: 800; cursor: pointer; }
    .nav-btn { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.85rem; background: rgba(0,0,0,0.05); padding: 8px 16px; border-radius: 50px; }

    header { position: relative; height: 100vh; overflow: hidden; }
    .slide { display: none; position: absolute; width: 100%; height: 100%; }
    .slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(60%); }
    .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; width: 90%; }
    .search-wrapper { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); padding: 8px; border-radius: 100px; display: inline-flex; align-items: center; }
    #pet-search { padding: 14px 25px; width: 300px; border-radius: 50px; border: none; transition: width 0.4s; outline: none; }
    @media (min-width: 601px) { #pet-search:focus { width: 480px; } }
    .btn-main { padding: 14px 30px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; margin-left: 10px; }
    .btn-main:active { background: var(--primary-light) !important; color: var(--primary-dark) !important; transform: scale(0.96); }

    section { padding: 5rem 1.5rem; max-width: 1250px; margin: auto; }
    .features { display: grid; gap: 2rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .feature { padding: 3rem 2rem; border-radius: 30px; background: #f9f9f9; text-align: center; }

    .pets { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); justify-content: center; }
    .pet-card { background: white; border-radius: 28px; overflow: hidden; transition: 0.5s; border: 1px solid #f0f0f0; }
    .pet-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .pet-card .info { padding: 1.5rem; }
    .buy-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 16px; cursor: pointer; font-weight: 700; }
    .buy-btn:active { background: var(--primary-light) !important; color: var(--primary-dark) !important; transform: scale(0.96); }

    /* Detail Gallery */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1100px; margin: auto; padding: 0 20px; }
    .detail-gallery img { width: 100%; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .thumbs { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
    .thumbs img { width: 70px; height: 70px; border-radius: 10px; cursor: pointer; object-fit: cover; border: 2px solid transparent; }
    .thumbs img:hover { border-color: var(--primary); }
    
    .detail-info h2 { font-size: 2.2rem; }
    .detail-price { font-size: 1.6rem; color: var(--primary); font-weight: 800; margin: 15px 0; }
    .about-section { background: #f9f9f9; padding: 30px; border-radius: 24px; }
    .detail-actions { display: grid; gap: 15px; margin-top: 30px; }
    .wa-btn { background: var(--primary); color: white; padding: 18px; border-radius: 15px; font-weight: 700; text-align: center; text-decoration: none; }
    .wa-btn:active { background: var(--primary-light) !important; color: var(--primary-dark) !important; transform: scale(0.96); }
    .contact-btn { background: var(--dark); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; }
    .contact-btn:active { background: var(--primary-light) !important; color: var(--primary-dark) !important; transform: scale(0.96); }

    @media (max-width: 600px) {
        .features { grid-template-columns: 1fr 1fr; gap: 10px; }
        .feature { padding: 1.5rem 10px; border-radius: 20px; }
        .feature h3 { font-size: 0.9rem; }
        .feature p { font-size: 0.7rem; }
        .pets { grid-template-columns: 1fr 1fr; gap: 10px; }
        .pet-card .info h4 { font-size: 0.95rem; }
        .detail-grid { grid-template-columns: 1fr; }
        .search-wrapper { flex-direction: column; background: none; border: none; width: 100%; }
        #pet-search { width: 100% !important; }
        .btn-main { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<nav>
    <div class="logo" onclick="goHome()">AQUAMARINE</div>
    <a href="#featured-pets" class="nav-btn" onclick="goHome()">Browse Inventory</a>
</nav>

<div id="main-content">
    <header>
      <div class="slideshow-container">
        <div class="slide"><img src="https://bbkzmqupvtvhqcjaxmcw.supabase.co/storage/v1/object/public/Website/slide1.jpg"></div>
        <div class="slide"><img src="https://bbkzmqupvtvhqcjaxmcw.supabase.co/storage/v1/object/public/Website/slide2.jpg"></div>
        <div class="slide"><img src="https://bbkzmqupvtvhqcjaxmcw.supabase.co/storage/v1/object/public/Website/slide3.jpg"></div>
        <div class="header-text">
          <h1>Pure Joy. <br>Pure Breed.</h1>
          <p>Companions that redefine unconditional love.</p>
          <div class="search-wrapper">
              <input type="text" id="pet-search" placeholder="Search our collection..." />
              <button class="btn-main" onclick="document.getElementById('featured-pets').scrollIntoView({behavior:'smooth'})">Explore</button>
          </div>
        </div>
      </div>
    </header>

    <section class="features">
      <div class="feature reveal">
          <div style="font-size:2.5rem;">🛡️</div>
          <h3>Lifetime Health</h3>
          <p>Verified health guarantees.</p>
      </div>
      <div class="feature reveal">
          <div style="font-size:2.5rem;">💎</div>
          <h3>Elite Lineage</h3>
          <p>Globally recognized breeders.</p>
      </div>
    </section>

    <section id="featured-pets">
      <h2 style="text-align:center; font-size: 2rem; margin-bottom:3rem;">Available Inventory</h2>
      <div class="pets reveal" id="pets-container"></div>
    </section>
</div>

<div id="detail-view">
    <div style="padding: 10px 20px; cursor: pointer; color: #718096;" onclick="goHome()">← Back</div>
    <div class="detail-grid" id="detail-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://bbkzmqupvtvhqcjaxmcw.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJia3ptcXVwdnR2aHFjamF4bWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjgwMTYsImV4cCI6MjA4OTgwNDAxNn0.upfrcHG8B0qZM_ruy97UL1AA-ykpCmyQ_1db0B7vkjg';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allPets = [];
  const myNumber = "94742934189";

  function goHome() { document.body.classList.remove('showing-details'); window.scrollTo(0,0); }

  function revealPhone(btn) {
      btn.innerText = "Call: +" + myNumber;
      btn.style.backgroundColor = "var(--primary-light)";
      btn.style.color = "var(--primary-dark)";
  }

  function showPetDetails(petId) {
      const loader = document.getElementById('loader');
      loader.style.display = 'flex';
      setTimeout(() => {
          const pet = allPets.find(p => p.id == petId);
          const detailContainer = document.getElementById('detail-content');
          const imgs = pet.images && pet.images.length > 0 ? pet.images : [pet.image_url];
          
          const waMsg = encodeURIComponent(`Hello I’m interested in buying:\n\nPet: ${pet.name}\nPrice: Rs. ${pet.price}`);
          
          detailContainer.innerHTML = `
            <div class="detail-gallery">
                <img id="main-img" src="${imgs[0]}">
                <div class="thumbs">
                    ${imgs.map(u => `<img src="${u}" onclick="document.getElementById('main-img').src='${u}'">`).join('')}
                </div>
            </div>
            <div class="detail-info">
                <h2>${pet.name}</h2>
                <p class="detail-price">Rs. ${pet.price}</p>
                <div class="about-section">
                    <h3>About</h3>
                    <p style="margin-bottom:15px;">${pet.description || 'Premium quality breed.'}</p>
                    <p>✅ <b>Size:</b> ${pet.size || 'N/A'}</p>
                    <p>✅ <b>Health:</b> ${pet.health || 'Verified'}</p>
                </div>
                <div class="detail-actions">
                    <a href="https://wa.me/${myNumber}?text=${waMsg}" target="_blank" class="wa-btn">Inquire via WhatsApp</a>
                    <button class="contact-btn" onclick="revealPhone(this)">Contact Us</button>
                </div>
            </div>
          `;
          loader.style.display = 'none';
          document.body.classList.add('showing-details');
          window.scrollTo(0,0);
      }, 800);
  }

  async function loadPets() {
    const { data } = await supabaseClient.from('pets').select('*');
    allPets = data || [];
    renderPets(allPets);
  }

  function renderPets(list) {
    const container = document.getElementById('pets-container');
    container.innerHTML = '';
    list.forEach(pet => {
      const card = document.createElement('div');
      card.className = 'pet-card';
      const thumb = pet.images && pet.images.length > 0 ? pet.images[0] : pet.image_url;
      card.innerHTML = `<img src="${thumb}"><div class="info"><h4>${pet.name}</h4><p style="color:var(--primary); font-weight:700;">Rs. ${pet.price}</p><button class="buy-btn" onclick="showPetDetails('${pet.id}')">View Details</button></div>`;
      container.appendChild(card);
    });
  }

  function reveal() {
    document.querySelectorAll(".reveal").forEach(el => {
      if (el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add("active");
    });
  }
  window.addEventListener("scroll", reveal);
  let sIdx = 0;
  function showSlides() {
    const slides = document.querySelectorAll(".slide");
    slides.forEach(s => s.style.display = "none");
    sIdx++; if(sIdx > slides.length) sIdx = 1;
    if(slides[sIdx-1]) slides[sIdx-1].style.display = "block";
    setTimeout(showSlides, 4500);
  }
  loadPets(); showSlides(); reveal();
</script>
</body>
</html>
