<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquamarine Admin | Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #38a169; --primary-dark: #2f855a; --bg: #f7fafc; --dark: #1a202c; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .btn-add { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    #pet-form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 40px; display: none; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; color: #4a5568; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 5px; outline-color: var(--primary); }
    .inventory-card { background: white; display: flex; align-items: center; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #edf2f7; }
    .inventory-card img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; margin-right: 20px; }
    .actions { display: flex; gap: 10px; }
    .btn-edit { background: #f0f4f8; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-del { background: #fff5f5; color: #c53030; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Aquamarine Inventory</h1>
    <button class="btn-add" onclick="toggleForm()">+ Add New Pet</button>
  </header>

  <div id="pet-form-container">
    <h2 id="form-title" style="margin-bottom: 20px;">Add New Pet</h2>
    <form id="pet-form">
      <input type="hidden" id="pet-id">
      <div class="form-grid">
        <div class="full-width">
            <label>Upload Pet Images (Select Multiple)</label>
            <input type="file" id="pet-files" accept="image/*" multiple>
            <small style="color: #a0aec0;">The first image will be the homepage cover.</small>
        </div>
        <div><label>Pet Name</label><input type="text" id="pet-name" required></div>
        <div><label>Price (Rs.)</label><input type="number" id="pet-price" required></div>
        <div><label>Age</label><input type="text" id="pet-age"></div>
        <div><label>Size</label><input type="text" id="pet-size"></div>
        <div class="full-width"><label>About Description</label><textarea id="pet-desc"></textarea></div>
        <div><label>Coloration</label><input type="text" id="pet-color"></div>
        <div><label>Health</label><input type="text" id="pet-health"></div>
        <div><label>Temperament</label><input type="text" id="pet-temper"></div>
        <div><label>Care</label><input type="text" id="pet-care"></div>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 25px;">
        <button type="submit" id="submit-btn" class="btn-add" style="width: 100%;">Save to Inventory</button>
        <button type="button" onclick="toggleForm()" style="background:#edf2f7; border:none; padding:12px; border-radius:8px; cursor:pointer;">Cancel</button>
      </div>
    </form>
  </div>

  <div id="inventory-list">
    <h3>Current Inventory</h3>
    <div id="pets-container" style="margin-top: 20px;"><p>Loading...</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://bbkzmqupvtvhqcjaxmcw.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJia3ptcXVwdnR2aHFjamF4bWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjgwMTYsImV4cCI6MjA4OTgwNDAxNn0.upfrcHG8B0qZM_ruy97UL1AA-ykpCmyQ_1db0B7vkjg';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let isEditing = false;
  let currentPetImages = [];

  function toggleForm() {
    const f = document.getElementById('pet-form-container');
    f.style.display = (f.style.display === 'block') ? 'none' : 'block';
    if(f.style.display === 'none') {
        document.getElementById('pet-form').reset();
        document.getElementById('pet-id').value = '';
        currentPetImages = [];
        isEditing = false;
    }
  }

  async function loadInventory() {
    const { data } = await supabaseClient.from('pets').select('*');
    const container = document.getElementById('pets-container');
    container.innerHTML = '';
    data.forEach(pet => {
      const displayImg = pet.images && pet.images.length > 0 ? pet.images[0] : pet.image_url;
      const div = document.createElement('div');
      div.className = 'inventory-card';
      div.innerHTML = `<img src="${displayImg}"><div class="info"><h4>${pet.name}</h4><p>Rs. ${pet.price}</p></div><div class="actions"><button class="btn-edit" onclick="editPet('${pet.id}')">Edit</button><button class="btn-del" onclick="deletePet('${pet.id}')">Delete</button></div>`;
      container.appendChild(div);
    });
  }

  async function uploadFiles(files) {
    let urls = [];
    for (let file of files) {
        const fileName = `${Math.random()}.${file.name.split('.').pop()}`;
        const { error } = await supabaseClient.storage.from('pet-images').upload(fileName, file);
        if (!error) {
            const { data } = supabaseClient.storage.from('pet-images').getPublicUrl(fileName);
            urls.push(data.publicUrl);
        }
    }
    return urls;
  }

  document.getElementById('pet-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.innerText = "Uploading..."; btn.disabled = true;

    const fileInput = document.getElementById('pet-files');
    let newUrls = await uploadFiles(fileInput.files);
    let finalImages = isEditing && fileInput.files.length === 0 ? currentPetImages : newUrls;

    const petData = {
      name: document.getElementById('pet-name').value,
      price: document.getElementById('pet-price').value,
      images: finalImages, // Save as array
      image_url: finalImages[0] || "", // Keep for compatibility
      age: document.getElementById('pet-age').value,
      description: document.getElementById('pet-desc').value,
      health: document.getElementById('pet-health').value,
      temperament: document.getElementById('pet-temper').value,
      care: document.getElementById('pet-care').value,
      size: document.getElementById('pet-size').value,
      coloration: document.getElementById('pet-color').value
    };

    if (isEditing) await supabaseClient.from('pets').update(petData).eq('id', document.getElementById('pet-id').value);
    else await supabaseClient.from('pets').insert([petData]);

    btn.innerText = "Save to Inventory"; btn.disabled = false;
    toggleForm(); loadInventory();
  };

  async function editPet(id) {
    const { data } = await supabaseClient.from('pets').select('*').eq('id', id).single();
    document.getElementById('pet-id').value = data.id;
    document.getElementById('pet-name').value = data.name;
    document.getElementById('pet-price').value = data.price;
    document.getElementById('pet-age').value = data.age;
    document.getElementById('pet-desc').value = data.description;
    document.getElementById('pet-health').value = data.health;
    document.getElementById('pet-temper').value = data.temperament;
    document.getElementById('pet-care').value = data.care;
    document.getElementById('pet-size').value = data.size;
    document.getElementById('pet-color').value = data.coloration;
    currentPetImages = data.images || [];
    isEditing = true;
    document.getElementById('pet-form-container').style.display = 'block';
  }

  async function deletePet(id) { if(confirm('Delete?')) { await supabaseClient.from('pets').delete().eq('id', id); loadInventory(); } }

  loadInventory();
</script>
</body>
</html>
