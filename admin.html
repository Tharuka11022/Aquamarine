<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquamarine Admin | Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0071e3;
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --border: #d2d2d7;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
    .container { max-width: 1000px; margin: auto; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; }

    /* Button Styling */
    .btn { padding: 10px 20px; border-radius: 20px; font-weight: 500; cursor: pointer; border: none; transition: 0.2s; font-size: 14px; }
    .btn-add { background: var(--primary); color: white; }
    .btn-add:hover { opacity: 0.9; }
    
    /* Form Styling */
    #pet-form-container { 
        background: var(--card); padding: 40px; border-radius: 24px; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 40px; display: none; 
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #86868b; text-transform: uppercase; }
    input, textarea, select { 
        width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; 
        font-size: 16px; outline: none; transition: 0.2s; background: white;
    }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

    /* Inventory List */
    .inventory-grid { display: grid; gap: 15px; }
    .inventory-card { 
        background: var(--card); padding: 15px; border-radius: 18px; 
        display: flex; align-items: center; justify-content: space-between;
        border: 1px solid rgba(0,0,0,0.05);
    }
    .pet-preview { display: flex; align-items: center; gap: 20px; }
    .pet-preview img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #eee; }
    .pet-preview h4 { margin: 0; font-size: 17px; }
    .pet-preview p { margin: 4px 0 0; color: #86868b; font-size: 14px; }
    
    .badge { font-size: 10px; background: #eee; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; margin-left: 5px; }

    .actions { display: flex; gap: 10px; }
    .btn-edit { background: #f5f5f7; color: var(--text); }
    .btn-del { background: #fff1f1; color: #ff3b30; }

    #loading-overlay { 
        position: fixed; inset: 0; background: rgba(255,255,255,0.7); 
        backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000;
    }
  </style>
</head>
<body>

<div id="loading-overlay">Updating Inventory...</div>

<div class="container">
  <header>
    <h1>Inventory</h1>
    <button class="btn btn-add" onclick="prepareNewPet()">+ Add Pet</button>
  </header>

  <div id="pet-form-container">
    <h2 id="form-title" style="margin-top:0;">Add New Pet</h2>
    <form id="pet-form">
      <input type="hidden" id="pet-id">
      <div class="form-grid">
        <div class="full-width">
            <label>Images (Can select multiple)</label>
            <input type="file" id="pet-files" accept="image/*" multiple>
        </div>
        <div><label>Pet Name</label><input type="text" id="pet-name" required></div>
        <div><label>Price (Rs.)</label><input type="number" id="pet-price" required></div>
        
        <!-- NEW CATEGORY SELECTOR -->
        <div class="full-width">
            <label>Category</label>
            <select id="pet-category" required>
                <option value="" disabled selected>Select a category</option>
                <option value="fish">Fish</option>
                <option value="birds">Birds</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div><label>Age</label><input type="text" id="pet-age"></div>
        <div><label>Size</label><input type="text" id="pet-size"></div>
        <div class="full-width"><label>Description</label><textarea id="pet-desc" rows="3"></textarea></div>
        <div><label>Coloration</label><input type="text" id="pet-color"></div>
        <div><label>Health Status</label><input type="text" id="pet-health"></div>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 30px;">
        <button type="submit" id="submit-btn" class="btn btn-add" style="flex: 2;">Save Pet</button>
        <button type="button" onclick="toggleForm()" class="btn btn-edit" style="flex: 1;">Cancel</button>
      </div>
    </form>
  </div>

  <div id="inventory-list">
    <div class="inventory-grid" id="pets-container">
        <!-- Pets load here -->
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://bbkzmqupvtvhqcjaxmcw.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJia3ptcXVwdnR2aHFjamF4bWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjgwMTYsImV4cCI6MjA4OTgwNDAxNn0.upfrcHG8B0qZM_ruy97UL1AA-ykpCmyQ_1db0B7vkjg';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let isEditing = false;
  let currentPetImages = [];

  function toggleForm() {
    const f = document.getElementById('pet-form-container');
    f.style.display = (f.style.display === 'block') ? 'none' : 'block';
  }

  function prepareNewPet() {
      document.getElementById('pet-form').reset();
      document.getElementById('pet-id').value = '';
      document.getElementById('form-title').innerText = "Add New Pet";
      isEditing = false;
      currentPetImages = [];
      toggleForm();
  }

  async function loadInventory() {
    const { data, error } = await supabaseClient.from('pets').select('*').order('created_at', { ascending: false });
    const container = document.getElementById('pets-container');
    container.innerHTML = '';
    
    data.forEach(pet => {
      const displayImg = (pet.images && pet.images.length > 0) ? pet.images[0] : (pet.image_url || '');
      
      const div = document.createElement('div');
      div.className = 'inventory-card';
      div.innerHTML = `
        <div class="pet-preview">
            <img src="${displayImg}" onerror="this.src='https://via.placeholder.com/60?text=No+Img'">
            <div>
                <h4>${pet.name || 'Unnamed'} <span class="badge">${pet.category || 'N/A'}</span></h4>
                <p>Rs. ${pet.price || 0}</p>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-edit" onclick="editPet('${pet.id}')">Edit</button>
            <button class="btn btn-del" onclick="deletePet('${pet.id}')">Delete</button>
        </div>
      `;
      container.appendChild(div);
    });
  }

  async function editPet(id) {
    const { data, error } = await supabaseClient.from('pets').select('*').eq('id', id).single();
    if (error) return alert("Error fetching pet details");

    document.getElementById('pet-id').value = data.id;
    document.getElementById('pet-name').value = data.name || '';
    document.getElementById('pet-price').value = data.price || '';
    document.getElementById('pet-category').value = data.category || ''; // Sets the category dropdown
    document.getElementById('pet-age').value = data.age || '';
    document.getElementById('pet-desc').value = data.description || '';
    document.getElementById('pet-health').value = data.health || '';
    document.getElementById('pet-size').value = data.size || '';
    document.getElementById('pet-color').value = data.coloration || '';
    
    currentPetImages = data.images || (data.image_url ? [data.image_url] : []);
    
    isEditing = true;
    document.getElementById('form-title').innerText = "Edit " + (data.name || 'Pet');
    document.getElementById('pet-form-container').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function uploadFiles(files) {
    let urls = [];
    for (let file of files) {
        const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;
        const { error } = await supabaseClient.storage.from('pet-images').upload(fileName, file);
        if (!error) {
            const { data } = supabaseClient.storage.from('pet-images').getPublicUrl(fileName);
            urls.push(data.publicUrl);
        }
    }
    return urls;
  }

  document.getElementById('pet-form').onsubmit = async (e) => {
    e.preventDefault();
    document.getElementById('loading-overlay').style.display = 'flex';

    const fileInput = document.getElementById('pet-files');
    let finalImages = currentPetImages;

    if (fileInput.files.length > 0) {
        const newUrls = await uploadFiles(fileInput.files);
        finalImages = newUrls; 
    }

    const petData = {
      name: document.getElementById('pet-name').value,
      price: document.getElementById('pet-price').value,
      category: document.getElementById('pet-category').value, // SAVES THE CATEGORY
      images: finalImages,
      image_url: finalImages[0] || "",
      age: document.getElementById('pet-age').value,
      description: document.getElementById('pet-desc').value,
      health: document.getElementById('pet-health').value,
      size: document.getElementById('pet-size').value,
      coloration: document.getElementById('pet-color').value
    };

    if (isEditing) {
        await supabaseClient.from('pets').update(petData).eq('id', document.getElementById('pet-id').value);
    } else {
        await supabaseClient.from('pets').insert([petData]);
    }

    document.getElementById('loading-overlay').style.display = 'none';
    prepareNewPet();
    toggleForm();
    loadInventory();
  };

  async function deletePet(id) { 
      if(confirm('Delete this pet permanently?')) { 
          await supabaseClient.from('pets').delete().eq('id', id); 
          loadInventory(); 
      } 
  }

  loadInventory();
</script>
</body>
</html>
